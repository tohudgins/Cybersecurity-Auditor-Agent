# Deliberately weak sshd_config for demo purposes.
# Do NOT use in production.

Port 22
Protocol 2

PermitRootLogin yes
PasswordAuthentication yes
PermitEmptyPasswords yes
PubkeyAuthentication yes
ChallengeResponseAuthentication no

X11Forwarding yes
PrintMotd no
AcceptEnv LANG LC_*

UsePAM yes
Subsystem sftp /usr/lib/openssh/sftp-server

# No MaxAuthTries set (defaults to 6, but no explicit hardening)
# No ClientAliveInterval set
# No AllowUsers / AllowGroups restriction
